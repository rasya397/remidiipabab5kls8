<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remedial IPA: Unsur, Senyawa & Campuran</title>
  <style>
    :root {
      --primary: #059669;
      --primary-dark: #047857;
      --secondary: #0d9488;
      --accent: #d97706;
      --bg-color: #ecfdf5;
      --card-bg: #ffffff;
      --text-color: #1f2937;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #f59e0b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', 'Roboto', Helvetica, Arial, sans-serif;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    input, textarea { user-select: text; }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background-image:
        radial-gradient(var(--secondary) 0.5px, transparent 0.5px),
        radial-gradient(var(--primary) 0.5px, #ecfdf5 0.5px);
      background-size: 20px 20px;
      background-position: 0 0, 10px 10px;
    }

    .app-container {
      width: 95%;
      max-width: 700px;
      height: auto;
      max-height: 95vh;
      background: var(--card-bg);
      border-radius: 1.5rem;
      box-shadow: 0 10px 30px rgba(5, 150, 105, 0.15);
      padding: 2rem;
      position: relative;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      border: 1px solid #d1fae5;
    }

    .app-container::-webkit-scrollbar { width: 8px; }
    .app-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    .app-container::-webkit-scrollbar-thumb { background: #a7f3d0; border-radius: 10px; }
    .app-container::-webkit-scrollbar-thumb:hover { background: var(--primary); }

    .header-decoration { text-align: center; margin-bottom: 1.5rem; }
    .header-icon { font-size: 3rem; display: block; margin-bottom: 0.5rem; }

    h1 { color: var(--primary-dark); font-size: 1.5rem; line-height: 1.3; }
    h1 span { display: block; font-size: 1rem; color: var(--secondary); font-weight: normal; margin-top: 0.2rem; }

    .input-group { margin-bottom: 1.5rem; }

    input[type="text"] {
      width: 100%;
      padding: 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 1rem;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
      background: #f9fafb;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      padding: 1rem 2rem;
      border-radius: 1rem;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
    .primary-btn:active { transform: scale(0.98); }

    .secondary-btn {
      background: #ffffff;
      color: var(--primary-dark);
      border: 2px solid #a7f3d0;
      padding: 0.6rem 1rem;
      border-radius: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: none;
      transition: transform 0.15s;
    }

    .history-section { margin-top: 2rem; border-top: 2px dashed #e5e7eb; padding-top: 1.5rem; }
    .history-title { font-size: 1rem; font-weight: bold; color: var(--text-color); margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
    .clear-history-btn { background: none; border: none; color: #ef4444; font-size: 0.8rem; cursor: pointer; text-decoration: underline; }
    .history-list { list-style: none; max-height: 250px; overflow-y: auto; }
    .history-item { background: #f9fafb; padding: 0.8rem; border-radius: 0.5rem; margin-bottom: 0.5rem; font-size: 0.85rem; border-left: 4px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
    .history-item.completed { border-left-color: var(--success); }
    .history-item.disqualified { border-left-color: var(--error); background: #fef2f2; }

    #quiz-screen { display: none; }
    .header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; font-size: 0.9rem; color: #4b5563; background: #f0fdf4; padding: 0.8rem; border-radius: 0.8rem; font-weight: 600; }

    .progress-bar { width: 100%; height: 10px; background-color: #e5e7eb; border-radius: 5px; margin-bottom: 1.25rem; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: width 0.5s; }

    .question-box { margin-bottom: 1.5rem; text-align: center; }
    .question-text { font-size: 1rem; font-weight: 700; color: var(--text-color); margin-bottom: 1rem; line-height: 1.5; }

    .answer-slots { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; min-height: 3.5rem; padding: 0.8rem; background: #f8fafc; border-radius: 1rem; border: 1px dashed #cbd5e1; }
    .slot { width: 40px; height: 40px; background: white; border: 2px solid var(--primary); border-radius: 0.6rem; display: inline-flex; justify-content: center; align-items: center; font-size: 1.2rem; font-weight: bold; color: var(--primary-dark); cursor: pointer; transition: all 0.2s; }
    .slot.empty { background: #e2e8f0; border-color: #cbd5e1; cursor: default; }

    .letter-pool { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.5rem; }
    .letter-btn { width: 45px; height: 45px; background: white; border: 2px solid #d1d5db; border-radius: 0.8rem; display: inline-flex; justify-content: center; align-items: center; font-size: 1.1rem; font-weight: bold; color: #4b5563; cursor: pointer; box-shadow: 0 4px 0 #d1d5db; transition: all 0.1s; }
    .letter-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #d1d5db; }
    .letter-btn.used { opacity: 0; pointer-events: none; transform: scale(0.8); }

    #result-screen { display: none; text-align: center; }
    .score-circle { width: 120px; height: 120px; background: var(--bg-color); border: 5px solid var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; font-weight: bold; color: var(--primary-dark); margin: 1rem auto; transition: all 0.3s; }

    #warning-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(185, 28, 28, 0.98); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; text-align: center; padding: 2rem; }
    #warning-timer { font-size: 5rem; font-weight: 800; margin: 1rem 0; }

    #feedback-msg { text-align: center; margin-top: 0.5rem; font-weight: bold; height: 1.5rem; opacity: 0; transition: opacity 0.3s; }

    @media (max-width: 480px) {
      .app-container { padding: 1.2rem; }
      .slot { width: 34px; height: 34px; font-size: 1rem; }
      .letter-btn { width: 38px; height: 38px; font-size: 1rem; }
    }
  </style>
</head>
<body>

  <div id="warning-overlay">
    <h1>PERINGATAN!</h1>
    <p>Layar tidak fokus. Kembali ke aplikasi segera!</p>
    <div id="warning-timer">3</div>
    <button id="warning-return-btn" class="primary-btn" style="background: white; color: #991b1b; width: auto;">KEMBALI KE UJIAN</button>
  </div>

  <div class="app-container">
    <div id="login-screen">
      <div class="header-decoration">
        <span class="header-icon">🔬</span>
        <h1>Remedial IPA Kelas VIII<span>Bab 5: Unsur, Senyawa, & Campuran</span></h1>
      </div>
      <div class="input-group">
        <input type="text" id="student-name" placeholder="Nama Lengkap Siswa" autocomplete="off" />
      </div>
      <button id="start-btn" class="primary-btn" type="button">MULAI REMEDIAL</button>
      <div class="history-section">
        <div class="history-title">Riwayat Remedial<button class="clear-history-btn" id="clear-history-btn">Hapus</button></div>
        <ul id="history-list" class="history-list"></ul>
      </div>
    </div>

    <div id="quiz-screen">
      <div class="header-info">
        <div id="display-name">Siswa</div>
        <div id="progress-text">0/20</div>
        <div id="timer">00:00</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="question-box"><div class="question-text" id="question-text">Loading...</div></div>
      <div class="answer-slots" id="answer-slots"></div>
      <div id="feedback-msg"></div>
      <div style="text-align:center; margin-bottom: 1rem;">
        <button id="reset-answer-btn" class="secondary-btn">Hapus Jawaban</button>
      </div>
      <div class="letter-pool" id="letter-pool"></div>
    </div>

    <div id="result-screen">
      <div class="header-decoration"><span class="header-icon" id="result-icon">🏆</span><h1 id="result-title">Hasil Remedial</h1></div>
      <div class="score-circle" id="final-score">0</div>
      <p id="result-info" style="margin-bottom: 1.5rem; font-weight: bold; line-height: 1.6;"></p>
      <div id="submit-status" style="font-size: 0.85rem; margin-bottom: 1.25rem; color: #6b7280; font-style: italic;">Mengirim hasil...</div>
      <button id="return-btn" class="primary-btn">Kembali ke Menu Utama</button>
    </div>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzgvj5xYpGjxzYIWR-3GYuaovIG3EVv3UiheFtWqXUKsK-7C_hL4_c8LVKYqYO3S9nSbQ/exec";

    const questionBank = [
      { q: "Organisasi internasional yang mengatur penamaan unsur kimia adalah...?", a: "IUPAC" },
      { q: "Unsur logam yang berwujud cair pada suhu ruang adalah...?", a: "MERKURI" },
      { q: "Bagian terkecil dari suatu unsur yang masih memiliki sifat unsur tersebut...?", a: "ATOM" },
      { q: "Subpartikel atom yang bermuatan negatif adalah...?", a: "ELEKTRON" },
      { q: "Baris horizontal dalam tabel periodik unsur disebut...?", a: "PERIODE" },
      { q: "Unsur yang memiliki sifat antara logam dan nonlogam disebut...?", a: "METALOID" },
      { q: "Zat tunggal yang terbentuk dari dua unsur atau lebih melalui ikatan kimia...?", a: "SENYAWA" },
      { q: "Campuran yang serba sama dan tidak bisa dibedakan lagi komponennya...?", a: "LARUTAN" },
      { q: "Campuran heterogen yang partikelnya mengendap jika didiamkan...?", a: "SUSPENSI" },
      { q: "Susu dan santan adalah contoh campuran tipe...?", a: "KOLOID" },
      { q: "Pemisahan campuran berdasarkan perbedaan ukuran partikel menggunakan kertas...?", a: "FILTRASI" },
      { q: "Metode pemisahan campuran berdasarkan perbedaan titik didih zat...?", a: "DISTILASI" },
      { q: "Pemisahan komponen warna pada tinta menggunakan metode...?", a: "KROMATOGRAFI" },
      { q: "Proses pemurnian garam dari air laut melalui penguapan disebut...?", a: "KRISTALISASI" },
      { q: "Simbol kimia (s) dalam persamaan reaksi menunjukkan wujud zat...?", a: "PADAT" },
      { q: "Unsur paling melimpah di alam semesta adalah...?", a: "HIDROGEN" },
      { q: "Simbol (aq) dalam kimia berarti zat tersebut terlarut dalam...?", a: "AIR" },
      { q: "Emas dan perak termasuk kelompok logam...?", a: "MULIA" },
      { q: "Alat laboratorium untuk memutar campuran dengan sangat cepat adalah...?", a: "SENTRIFUGAL" },
      { q: "Gas yang digunakan untuk mengisi balon karena sangat ringan adalah...?", a: "HELIUM" }
    ];

    let state = {
      questions: [], index: 0, correct: 0, startTime: null, timerSec: 0, timerInterval: null,
      userName: '', currentAnswer: [], pool: [], inputLocked: false, focusMode: false, warningInterval: null
    };

    const dom = {
      login: document.getElementById('login-screen'), quiz: document.getElementById('quiz-screen'), result: document.getElementById('result-screen'),
      nameInp: document.getElementById('student-name'), startBtn: document.getElementById('start-btn'), history: document.getElementById('history-list'),
      dispName: document.getElementById('display-name'), progText: document.getElementById('progress-text'), timer: document.getElementById('timer'),
      progFill: document.getElementById('progress-fill'), qText: document.getElementById('question-text'), slots: document.getElementById('answer-slots'),
      pool: document.getElementById('letter-pool'), feedback: document.getElementById('feedback-msg'), finalScore: document.getElementById('final-score'),
      warning: document.getElementById('warning-overlay'), warnTimer: document.getElementById('warning-timer'), returnBtn: document.getElementById('return-btn'),
      submitStatus: document.getElementById('submit-status'), resultIcon: document.getElementById('result-icon'), resultTitle: document.getElementById('result-title'),
      resultInfo: document.getElementById('result-info')
    };

    function startQuiz() {
      const name = dom.nameInp.value.trim();
      if (!name) return alert("Harap isi nama Anda!");
      state.userName = name;
      state.questions = shuffle([...questionBank]);
      state.index = 0; state.correct = 0; state.timerSec = 0;
      state.startTime = new Date();
      dom.dispName.textContent = name;
      showScreen('quiz');
      startTimer();
      enableAntiCheat();
      loadQuestion();
    }

    function loadQuestion() {
      const q = state.questions[state.index];
      dom.qText.textContent = `${state.index + 1}. ${q.q}`;
      dom.progText.textContent = `${state.index + 1}/20`;
      dom.progFill.style.width = `${((state.index + 1) / 20) * 100}%`;
      state.currentAnswer = new Array(q.a.length).fill(null);
      state.pool = generatePool(q.a);
      state.inputLocked = false;
      dom.feedback.style.opacity = '0';
      renderSlots(); renderPool();
    }

    function generatePool(ans) {
      let chars = ans.split('');
      const extras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
      for (let i = 0; i < 4; i++) chars.push(extras[Math.floor(Math.random() * 26)]);
      return shuffle(chars.map((c, i) => ({ id: i, char: c, used: false })));
    }

    function renderSlots() {
      dom.slots.innerHTML = '';
      state.currentAnswer.forEach((char, i) => {
        const s = document.createElement('div');
        s.className = `slot ${char ? '' : 'empty'}`;
        s.textContent = char || '';
        s.onclick = () => char && !state.inputLocked && removeChar(i);
        dom.slots.appendChild(s);
      });
    }

    function renderPool() {
      dom.pool.innerHTML = '';
      state.pool.forEach(item => {
        const b = document.createElement('button');
        b.className = `letter-btn ${item.used ? 'used' : ''}`;
        b.textContent = item.char;
        b.onclick = () => !item.used && !state.inputLocked && addChar(item);
        dom.pool.appendChild(b);
      });
    }

    function addChar(item) {
      const idx = state.currentAnswer.indexOf(null);
      if (idx === -1) return;
      state.currentAnswer[idx] = item.char;
      item.used = true;
      renderSlots(); renderPool();
      if (!state.currentAnswer.includes(null)) checkAnswer();
    }

    function removeChar(idx) {
      const char = state.currentAnswer[idx];
      const poolItem = state.pool.find(p => p.char === char && p.used);
      if (poolItem) poolItem.used = false;
      state.currentAnswer[idx] = null;
      renderSlots(); renderPool();
    }

    function checkAnswer() {
      state.inputLocked = true;
      const ans = state.currentAnswer.join('');
      const correct = state.questions[state.index].a;
      if (ans === correct) {
        state.correct++;
        dom.feedback.textContent = "BENAR! ✨";
        dom.feedback.style.color = "var(--success)";
        dom.feedback.style.opacity = '1';
        setTimeout(() => (state.index < 19 ? (state.index++, loadQuestion()) : finish()), 800);
      } else {
        dom.feedback.textContent = "SALAH! ❌";
        dom.feedback.style.color = "var(--error)";
        dom.feedback.style.opacity = '1';
        setTimeout(() => {
          state.currentAnswer.forEach((c, i) => removeChar(i));
          state.inputLocked = false;
        }, 1000);
      }
    }

    async function sendResult(finalScore, status, endTime, answeredCount) {
      if (!GOOGLE_SCRIPT_URL) return;
      dom.submitStatus.textContent = "Sedang mengirim hasil ke laboratorium...";
      
      const data = new URLSearchParams();
      data.append('nama', state.userName);
      data.append('skor', finalScore);
      data.append('status', status);
      data.append('terjawab', answeredCount);
      data.append('durasi', formatTime(state.timerSec));
      data.append('waktu_mulai', state.startTime.toLocaleString());
      data.append('waktu_selesai', endTime.toLocaleString());

      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: data
        });
        dom.submitStatus.textContent = "✅ Data berhasil disimpan di spreadsheet.";
      } catch (e) {
        dom.submitStatus.textContent = "⚠️ Gagal mengirim data. Silakan screenshot halaman ini.";
      }
    }

    function finish() {
      const endTime = new Date();
      disableAntiCheat();
      clearInterval(state.timerInterval);
      const score = Math.round((state.correct / 20) * 100);
      
      dom.finalScore.textContent = score;
      dom.finalScore.style.borderColor = "var(--primary)";
      dom.finalScore.style.color = "var(--primary-dark)";
      dom.resultIcon.textContent = "🏆";
      dom.resultTitle.textContent = "Hasil Remedial";
      dom.resultInfo.innerHTML = `<span style="color:var(--primary-dark)">Selesai!</span><br>Anda mengerjakan 20/20 soal<br>Durasi: ${formatTime(state.timerSec)}`;
      
      showScreen('result');
      saveHistory(score, "Selesai", 20);
      sendResult(score, "Selesai", endTime, 20);
    }

    function showScreen(s) {
      dom.login.style.display = s === 'login' ? 'block' : 'none';
      dom.quiz.style.display = s === 'quiz' ? 'block' : 'none';
      dom.result.style.display = s === 'result' ? 'block' : 'none';
    }

    function startTimer() {
      clearInterval(state.timerInterval);
      state.timerInterval = setInterval(() => {
        state.timerSec++;
        dom.timer.textContent = formatTime(state.timerSec);
      }, 1000);
    }

    function formatTime(s) {
      const m = Math.floor(s / 60).toString().padStart(2, '0');
      const sec = (s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;
    }

    function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

    function saveHistory(s, status, answered) {
      const h = JSON.parse(localStorage.getItem('ipa_remidi_h') || '[]');
      h.unshift({ 
        name: state.userName, 
        score: s, 
        status: status, 
        answered: answered, 
        date: new Date().toLocaleString() 
      });
      localStorage.setItem('ipa_remidi_h', JSON.stringify(h.slice(0, 10)));
      renderHistory();
    }

    function renderHistory() {
      const h = JSON.parse(localStorage.getItem('ipa_remidi_h') || '[]');
      dom.history.innerHTML = h.length ? h.map(i => {
        const isDisq = i.status === 'Diskualifikasi';
        return `
          <li class="history-item ${isDisq ? 'disqualified' : 'completed'}">
            <div>
              <b>${i.name}</b><br>
              <small>${i.date}</small><br>
              <span style="font-size: 0.7rem; color: ${isDisq ? 'var(--error)' : 'var(--primary-dark)'}; font-weight: bold;">
                ${i.status} • ${i.answered || 0}/20 soal
              </span>
            </div>
            <div style="font-weight:bold; text-align:right;">
              ${i.score}<br><small style="font-weight:normal; color:#6b7280;">Skor</small>
            </div>
          </li>`;
      }).join('') : '<li style="text-align:center;color:#999">Belum ada riwayat</li>';
    }

    function enableAntiCheat() {
      state.focusMode = true;
      window.onblur = () => state.focusMode && triggerWarning();
      document.onvisibilitychange = () => document.hidden && state.focusMode && triggerWarning();
    }

    function disableAntiCheat() { 
      state.focusMode = false; 
      dom.warning.style.display = 'none'; 
      clearInterval(state.warningInterval);
    }

    function triggerWarning() {
      if (dom.warning.style.display === 'flex') return;
      dom.warning.style.display = 'flex';
      let t = 3; 
      dom.warnTimer.textContent = t;
      clearInterval(state.warningInterval);
      state.warningInterval = setInterval(() => {
        t--; 
        dom.warnTimer.textContent = t;
        if (t <= 0) { 
          clearInterval(state.warningInterval); 
          disqual(); 
        }
      }, 1000);
      document.getElementById('warning-return-btn').onclick = () => { 
        clearInterval(state.warningInterval); 
        dom.warning.style.display = 'none'; 
      };
    }

    function disqual() {
      const endTime = new Date();
      const countAttempted = state.index;
      disableAntiCheat();
      clearInterval(state.timerInterval);
      
      // Update UI Result khusus Diskualifikasi
      dom.finalScore.textContent = "0";
      dom.finalScore.style.borderColor = "var(--error)";
      dom.finalScore.style.color = "var(--error)";
      dom.resultIcon.textContent = "🚫";
      dom.resultTitle.textContent = "Diskualifikasi";
      dom.resultInfo.innerHTML = `<span style="color:var(--error)">PELANGGARAN MODE FOKUS</span><br>Sesi dihentikan pada soal ke-${countAttempted + 1}<br>Skor otomatis dianggap 0.`;
      
      showScreen('result');
      saveHistory(0, "Diskualifikasi", countAttempted);
      sendResult(0, "Diskualifikasi", endTime, countAttempted);
    }

    function resetApp() {
      state.focusMode = false;
      clearInterval(state.timerInterval);
      clearInterval(state.warningInterval);
      dom.nameInp.value = "";
      dom.submitStatus.textContent = "";
      showScreen('login');
      renderHistory();
      window.scrollTo(0,0);
    }

    dom.startBtn.onclick = startQuiz;
    dom.returnBtn.onclick = resetApp;
    document.getElementById('reset-answer-btn').onclick = () => state.currentAnswer.forEach((_, i) => removeChar(i));
    document.getElementById('clear-history-btn').onclick = () => { if(confirm("Hapus semua riwayat remedial?")) { localStorage.removeItem('ipa_remidi_h'); renderHistory(); } };

    renderHistory();
  </script>
</body>
</html>
